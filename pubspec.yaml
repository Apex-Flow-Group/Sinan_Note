name: apex_note
description: "Sinan Note - Your sharp and reliable companion."
version: 3.0.3+3340

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.5
  flutter_staggered_grid_view: ^0.7.0
  intl: any
  
  # Google Services (Compatible versions)
  google_sign_in: ^6.3.0
  googleapis: ^13.2.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  
  # Database (Stable versions)
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  
  # Storage & Files (UPDATED)
  path_provider: ^2.1.5
  path: ^1.8.3
  shared_preferences: ^2.2.2
  share_plus: ^10.0.0
  file_picker: ^8.1.2
  flutter_file_dialog: ^3.0.3
  
  # Notifications (UPDATED)
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^3.0.1
  
  # Security (UPDATED)
  permission_handler: ^12.0.1
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  encrypt: ^5.0.3
  pointycastle: ^3.7.3
  
  # UI
  flutter_slidable: ^4.0.3
  dynamic_color: 1.6.8
  package_info_plus: ^8.0.0
  
  # Code Editor
  flutter_code_editor: ^0.3.3
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0
  flutter_svg: ^2.0.0

  # Rich Text Editor
  flutter_quill: ">=11.0.0-dev.15 <12.0.0"
  
  # Other
  home_widget: ^0.6.0
  url_launcher: ^6.2.0
  flutter_markdown_plus: ^1.0.7
  sqflite: ^2.4.2
  in_app_update: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/app_icon.png
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Variable.ttf
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Variable.ttf

dependency_overrides:
  quill_native_bridge_windows:
    path: .quill_windows_stub

